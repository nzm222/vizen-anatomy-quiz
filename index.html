<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>実践解剖生理学 ○×クイズ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
      background: linear-gradient(135deg, #e0f7fa 0%, #80deea 50%, #e0f7fa 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .container { width: 100%; max-width: 480px; }

    /* ===== START ===== */
    #screen-start {
      background: #fff; border-radius: 24px;
      padding: 36px 28px; text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    #screen-start .emoji { font-size: 52px; margin-bottom: 12px; }
    #screen-start h1 { font-size: 20px; color: #333; margin-bottom: 4px; line-height: 1.4; }
    #screen-start .subtitle { font-size: 13px; color: #888; margin-bottom: 28px; }
    .mode-title { font-size: 12px; font-weight: bold; color: #aaa; letter-spacing: 1px; margin-bottom: 12px; }
    .mode-btn {
      display: block; width: 100%; padding: 16px;
      font-size: 16px; font-weight: bold; color: #fff;
      border: none; border-radius: 16px; cursor: pointer;
      margin-bottom: 12px; transition: transform 0.1s;
      text-align: left; display: flex; align-items: center; gap: 12px;
    }
    .mode-btn:active { transform: scale(0.97); }
    .mode-btn.random {
      background: linear-gradient(135deg, #26c6da, #00acc1);
      box-shadow: 0 4px 16px rgba(38,198,218,0.4);
    }
    .mode-btn.chapter {
      background: linear-gradient(135deg, #7c4dff, #9c6fff);
      box-shadow: 0 4px 16px rgba(124,77,255,0.35);
    }
    .mode-btn .btn-icon { font-size: 24px; }
    .mode-btn .btn-text { flex: 1; }
    .mode-btn .btn-main { display: block; font-size: 16px; }
    .mode-btn .btn-sub { display: block; font-size: 11px; opacity: 0.85; font-weight: normal; margin-top: 2px; }

    /* ===== CHAPTER SELECT ===== */
    #screen-chapter { display: none; }
    .chapter-header {
      background: #fff; border-radius: 20px 20px 0 0;
      padding: 20px 20px 12px; text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .chapter-header h2 { font-size: 16px; color: #333; margin-bottom: 4px; }
    .chapter-header p { font-size: 12px; color: #aaa; }
    .chapter-list {
      background: #fff; border-radius: 0 0 20px 20px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      margin-bottom: 12px;
    }
    .chapter-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; cursor: pointer;
      border-bottom: 1px solid #f5f5f5;
      transition: background 0.15s;
    }
    .chapter-item:last-child { border-bottom: none; }
    .chapter-item:hover { background: #f9f9f9; }
    .chapter-item:active { background: #f0f0f0; }
    .chapter-num {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #7c4dff, #9c6fff);
      color: #fff; font-size: 11px; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      shrink: 0; flex-shrink: 0;
    }
    .chapter-num.special { background: linear-gradient(135deg, #ff7043, #ff8a65); }
    .chapter-info { flex: 1; }
    .chapter-name { font-size: 14px; font-weight: bold; color: #333; line-height: 1.4; }
    .chapter-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
    .chapter-arrow { font-size: 16px; color: #ccc; }
    .back-btn {
      display: block; width: 100%; padding: 14px;
      font-size: 14px; font-weight: bold; color: #999;
      background: #fff; border: none; border-radius: 14px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* ===== QUIZ ===== */
    #screen-quiz { display: none; }
    .progress-bar-wrap {
      background: rgba(255,255,255,0.5); border-radius: 8px;
      height: 8px; margin-bottom: 10px; overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #26c6da, #00e5ff);
      border-radius: 8px; transition: width 0.4s ease;
    }
    .progress-text {
      text-align: right; font-size: 12px;
      color: rgba(255,255,255,0.9); margin-bottom: 14px; font-weight: bold;
    }
    .card {
      background: #fff; border-radius: 24px;
      padding: 28px 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .q-label {
      display: inline-block;
      background: linear-gradient(135deg, #26c6da, #00acc1);
      color: #fff; font-size: 11px; font-weight: bold;
      padding: 4px 12px; border-radius: 20px;
      margin-bottom: 8px; letter-spacing: 1px;
    }
    .q-chapter-badge {
      display: inline-block;
      font-size: 11px; color: #aaa;
      margin-bottom: 14px; margin-left: 8px;
    }
    .question {
      font-size: 17px; font-weight: bold; color: #333;
      line-height: 1.7; margin-bottom: 32px; min-height: 90px;
    }
    .judge-wrap { display: flex; gap: 14px; }
    .judge-btn {
      flex: 1; padding: 20px 8px; font-size: 28px;
      font-weight: bold; border: none; border-radius: 20px;
      cursor: pointer; transition: transform 0.1s;
    }
    .judge-btn:active { transform: scale(0.95); }
    .btn-maru {
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      color: #fff; box-shadow: 0 4px 16px rgba(67,233,123,0.4);
    }
    .btn-batsu {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      color: #fff; box-shadow: 0 4px 16px rgba(240,147,251,0.4);
    }

    /* ===== POPUP ===== */
    .overlay {
      display: none; position: fixed;
      inset: 0; background: rgba(0,0,0,0.45);
      z-index: 100; align-items: center; justify-content: center;
      padding: 20px;
    }
    .overlay.visible { display: flex; }
    .popup {
      background: #fff; border-radius: 24px;
      width: 100%; max-width: 420px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,0.25);
      animation: popIn 0.25s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .popup-header { padding: 24px 24px 16px; text-align: center; }
    .popup-header.correct { background: linear-gradient(135deg, #43e97b, #38f9d7); }
    .popup-header.wrong   { background: linear-gradient(135deg, #f093fb, #f5576c); }
    .popup-result-icon { font-size: 48px; margin-bottom: 6px; }
    .popup-result-label { font-size: 22px; font-weight: bold; color: #fff; }
    .popup-body { padding: 20px 24px 24px; }
    .popup-ans {
      font-size: 15px; font-weight: bold; color: #333;
      line-height: 1.6; margin-bottom: 12px;
      padding: 12px 16px;
      background: #f0fbff; border-radius: 12px;
      border-left: 4px solid #26c6da;
    }
    .popup-hint {
      font-size: 13px; color: #666; line-height: 1.7; margin-bottom: 20px;
      white-space: pre-line;
    }
    .next-btn {
      display: block; width: 100%; padding: 16px;
      font-size: 16px; font-weight: bold; color: #fff;
      background: linear-gradient(135deg, #26c6da, #00acc1);
      border: none; border-radius: 14px; cursor: pointer;
      box-shadow: 0 4px 14px rgba(38,198,218,0.35);
      transition: transform 0.1s;
    }
    .next-btn:active { transform: scale(0.97); }

    /* ===== RESULT ===== */
    #screen-result {
      display: none; background: #fff; border-radius: 24px;
      padding: 40px 28px; text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .result-emoji { font-size: 64px; margin-bottom: 16px; }
    .result-title { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 6px; }
    .result-sub { font-size: 13px; color: #aaa; margin-bottom: 24px; }
    .score-circle {
      width: 150px; height: 150px; border-radius: 50%;
      margin: 0 auto 28px; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .score-circle.s { background: linear-gradient(135deg, #43e97b, #38f9d7); }
    .score-circle.a { background: linear-gradient(135deg, #4facfe, #00f2fe); }
    .score-circle.b { background: linear-gradient(135deg, #ffb300, #ffd54f); }
    .score-circle.c { background: linear-gradient(135deg, #f093fb, #f5576c); }
    .score-num { font-size: 44px; font-weight: bold; color: #fff; line-height: 1; }
    .score-denom { font-size: 14px; color: rgba(255,255,255,0.8); }
    .score-pct { font-size: 20px; font-weight: bold; color: #fff; margin-top: 4px; }
    .stats { display: flex; gap: 12px; margin-bottom: 28px; }
    .stat-box { flex: 1; padding: 14px 8px; border-radius: 16px; text-align: center; }
    .stat-box.correct { background: #e8f5e9; }
    .stat-box.wrong   { background: #fce4ec; }
    .stat-num { font-size: 28px; font-weight: bold; }
    .stat-box.correct .stat-num { color: #2e7d32; }
    .stat-box.wrong   .stat-num { color: #c62828; }
    .stat-label { font-size: 12px; color: #777; }
    .result-msg { font-size: 14px; color: #555; line-height: 1.7; margin-bottom: 16px; }
    .retry-btn {
      display: block; width: 100%; padding: 16px;
      font-size: 16px; font-weight: bold; color: #fff;
      background: linear-gradient(135deg, #26c6da, #00acc1);
      border: none; border-radius: 16px; cursor: pointer;
      box-shadow: 0 4px 16px rgba(38,198,218,0.4);
      transition: transform 0.1s; margin-bottom: 10px;
    }
    .retry-btn:active { transform: scale(0.97); }
    .home-btn {
      display: block; width: 100%; padding: 14px;
      font-size: 15px; font-weight: bold; color: #888;
      background: #f5f5f5; border: none; border-radius: 16px; cursor: pointer;
      transition: transform 0.1s;
    }
    .home-btn:active { transform: scale(0.97); }

    /* ===== PAUSE ===== */
    .pause-btn {
      display: block; width: 100%; margin-top: 12px;
      padding: 10px; font-size: 13px; color: #00838f;
      background: rgba(255,255,255,0.85); border: none;
      border-radius: 14px; cursor: pointer; letter-spacing: 0.5px;
      font-weight: bold;
    }
    .pause-btn:hover { background: #fff; }
    .pause-popup { text-align: center; }
    .pause-popup .pause-icon { font-size: 48px; margin-bottom: 12px; }
    .pause-popup h3 { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 6px; }
    .pause-popup p  { font-size: 14px; color: #888; margin-bottom: 24px; }
    .resume-btn {
      display: block; width: 100%; padding: 16px;
      font-size: 16px; font-weight: bold; color: #fff;
      background: linear-gradient(135deg, #26c6da, #00acc1);
      box-shadow: 0 4px 16px rgba(38,198,218,0.35);
      border: none; border-radius: 14px; cursor: pointer;
      transition: transform 0.1s; margin-bottom: 10px;
    }
    .resume-btn:active { transform: scale(0.97); }
    .quit-btn {
      display: block; width: 100%; padding: 13px;
      font-size: 14px; font-weight: bold; color: #f5576c;
      background: none; border: 1px solid #fbc4cc;
      border-radius: 14px; cursor: pointer; transition: transform 0.1s;
    }
    .quit-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
<div class="container">

  <!-- START -->
  <div id="screen-start">
    <div class="emoji">🫀</div>
    <h1>実践解剖生理学<br>○×クイズ</h1>
    <p class="subtitle">全100問（章別）</p>
    <p class="mode-title">モードを選んでください</p>
    <button class="mode-btn random" onclick="startRandom()">
      <span class="btn-icon">🎲</span>
      <span class="btn-text">
        <span class="btn-main">ランダム10問</span>
        <span class="btn-sub">全100問からランダムに出題</span>
      </span>
    </button>
    <button class="mode-btn chapter" onclick="showChapterSelect()">
      <span class="btn-icon">📖</span>
      <span class="btn-text">
        <span class="btn-main">章ごとに解く</span>
        <span class="btn-sub">特別回・第1回〜第10回から選択</span>
      </span>
    </button>
  </div>

  <!-- CHAPTER SELECT -->
  <div id="screen-chapter">
    <div class="chapter-header">
      <h2>章を選んでください</h2>
      <p>各章の全問題が出題されます</p>
    </div>
    <div class="chapter-list" id="chapter-list"></div>
    <button class="back-btn" onclick="showStart()">← もどる</button>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz">
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-text" id="progress-text"></div>
    <div class="card">
      <div>
        <span class="q-label">QUESTION</span>
      </div>
      <p class="question" id="question-text"></p>
      <div class="judge-wrap">
        <button class="judge-btn btn-batsu" onclick="answer(false)">✕</button>
        <button class="judge-btn btn-maru"  onclick="answer(true)">○</button>
      </div>
    </div>
    <button class="pause-btn" onclick="pauseQuiz()">⏸ 中断する</button>
  </div>

  <!-- RESULT -->
  <div id="screen-result">
    <div class="result-emoji" id="result-emoji"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-sub" id="result-sub"></div>
    <div class="score-circle" id="score-circle">
      <div class="score-num" id="score-num"></div>
      <div class="score-denom" id="score-denom"></div>
      <div class="score-pct" id="score-pct"></div>
    </div>
    <div class="stats">
      <div class="stat-box correct">
        <div class="stat-num" id="correct-count"></div>
        <div class="stat-label">正解</div>
      </div>
      <div class="stat-box wrong">
        <div class="stat-num" id="wrong-count"></div>
        <div class="stat-label">不正解</div>
      </div>
    </div>
    <p class="result-msg" id="result-msg"></p>
    <button class="retry-btn" id="retry-btn">🔁 もう一度挑戦</button>
    <button class="home-btn" onclick="showStart()">🏠 トップへもどる</button>
  </div>

</div>

<!-- PAUSE OVERLAY -->
<div class="overlay" id="pause-overlay">
  <div class="popup">
    <div class="popup-body pause-popup">
      <div class="pause-icon">⏸</div>
      <h3>中断中</h3>
      <p id="pause-progress-text"></p>
      <button class="resume-btn" onclick="resumeQuiz()">▶ 再開する</button>
      <button class="quit-btn" onclick="quitQuiz()">✕ やめてトップへ戻る</button>
    </div>
  </div>
</div>

<!-- POPUP -->
<div class="overlay" id="popup-overlay">
  <div class="popup">
    <div class="popup-header" id="popup-header">
      <div class="popup-result-icon" id="popup-icon"></div>
      <div class="popup-result-label" id="popup-label"></div>
    </div>
    <div class="popup-body">
      <div class="popup-ans" id="popup-ans"></div>
      <p class="popup-hint" id="popup-hint"></p>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ →</button>
    </div>
  </div>
</div>

<script>
// ===================== 問題データ =====================
const CHAPTERS = [
  { id: 'special', label: '特別回', name: '顎関節の解剖と三叉神経の重要性', special: true },
  { id: 'ch1',  label: '第1回',  name: '骨格と関節 〜全身を支える構造と関節アプローチ〜' },
  { id: 'ch2',  label: '第2回',  name: '筋肉・腱 〜整筋ストレッチと機能解剖〜' },
  { id: 'ch3',  label: '第3回',  name: '血液と体液 〜むくみ・免疫のメカニズム〜' },
  { id: 'ch4',  label: '第4回',  name: '心臓と循環器系 〜血流・リンパのメカニズム〜' },
  { id: 'ch5',  label: '第5回',  name: '肺と呼吸器系 〜呼吸力アップで自律神経を整える〜' },
  { id: 'ch6',  label: '第6回',  name: '肝臓と消化器系 〜内臓からのSOSを見逃さない〜' },
  { id: 'ch7',  label: '第7回',  name: 'ホルモンと内分泌 〜心と体の繋がり・更年期〜' },
  { id: 'ch8',  label: '第8回',  name: '生殖器と泌尿器系 〜女性ホルモンの不思議〜' },
  { id: 'ch9',  label: '第9回',  name: '五感と感覚器系 〜お客様の「感覚」と「痛み」〜' },
  { id: 'ch10', label: '第10回', name: '脳と神経系 〜全身を支配する神経ネットワーク〜' },
];

const ALL_Q = [
  // ── 特別回 ──
  { chapter:'special', q:"顎関節は耳の穴のすぐ前に位置している。", correct:true, a:"○ 正しい", hint:"一般的に顎やエラを指すことが多いですが、実際の関節は耳の穴のすぐ前にあります。ここを意識することで的確なアプローチが可能になります。\n※復習するには特別回の動画を見てください。" },
  { chapter:'special', q:"顎を大きく開けた状態は、顎関節が脱臼している状態に近い。", correct:true, a:"○ 正しい", hint:"顎は「下に落ちてから前に出る」2段階の動きをしており、大開口時は脱臼に近い不安定な状態です。\n※復習するには特別回の動画を見てください。" },
  { chapter:'special', q:"関節円板は人体のすべての関節に存在する。", correct:false, a:"✕ 顎や手首・膝などの特殊な関節にのみ備わっている", hint:"特殊な負担がかかる顎や手首、膝などにのみ備わっているオプショナルパーツのような軟骨です。\n※復習するには特別回の動画を見てください。" },
  { chapter:'special', q:"顎を左右にずらしたり前に出したりしても、首の可動域や前屈のしやすさには影響しない。", correct:false, a:"✕ 首の回旋や前屈の制限に直結する", hint:"顎の位置は全身の重心や動きに深く影響を与え、首の回旋や前屈の制限に直結します。\n※復習するには特別回の動画を見てください。" },
  { chapter:'special', q:"口を閉じる咀嚼筋の一つである「内側翼突筋」は、顎の左右の横ずれに強く関与する。", correct:true, a:"○ 正しい", hint:"左右の横ずれに強く関与するため、顎関節の不調ケアにおいて重要な筋肉です。\n※復習するには特別回の動画を見てください。" },
  { chapter:'special', q:"咀嚼筋は瞬発力に優れた「白筋（速筋）」が圧倒的に多い。", correct:false, a:"✕ 「赤筋（遅筋）」が圧倒的に多い", hint:"咀嚼筋は持久力に優れた「赤筋（遅筋）」が圧倒的に多く、長時間働き続けることができます。\n※復習するには特別回の動画を見てください。" },
  { chapter:'special', q:"トリガーポイントを押すと、全く違う部位に痛みが響く「関連痛（放散痛）」が起こることがある。", correct:true, a:"○ 正しい", hint:"筋肉の老廃物の塊であるトリガーポイントの特徴で、押した場所とは別の場所に痛みが飛びます。\n※復習するには特別回の動画を見てください。" },
  { chapter:'special', q:"舌（ベロ）は上顎にべったりとついているのが正常な状態である。", correct:true, a:"○ 正しい", hint:"舌が落ちて舌骨が下垂すると、口を閉じる筋肉に過剰な負担がかかります。上顎につくのが正常です。\n※復習するには特別回の動画を見てください。" },
  { chapter:'special', q:"三叉神経は感覚を伝えるだけで、筋肉を動かす機能は持たない。", correct:false, a:"✕ 感覚性と運動性を併せ持つ混合神経", hint:"顔の感覚を伝える「感覚性」と、咀嚼筋を動かす「運動性」を併せ持つ混合神経です。\n※復習するには特別回の動画を見てください。" },
  // ── 第1回 ──
  { chapter:'ch1', q:"関節で骨同士がこすれ合わないように保護しているのは「靭帯」である。", correct:false, a:"✕ 「関節軟骨」が正解", hint:"こすれ合わないように保護しているのは「関節軟骨」です。靭帯は関節が外れないように固定する組織です。\n※復習するには第1回の動画を見てください。" },
  { chapter:'ch1', q:"膝に水がたまるのは、すり減った軟骨によって起こる関節内の炎症を鎮めるための身体の防衛反応である。", correct:true, a:"○ 正しい", hint:"火事を消すために水（滑液）が過剰に分泌された状態です。炎症が治まらないと水を抜いてもまた溜まります。\n※復習するには第1回の動画を見てください。" },

  { chapter:'ch1', q:"関節モビリゼーションは、関節を解剖学的な限界を超えて大きく動かす手技である。", correct:false, a:"✕ 解剖学的な限界を超えない範囲で微細な刺激を加える安全な手技", hint:"解剖学的な限界を超えない範囲で、関節包などに「微細な刺激（スライドや牽引）」を加える安全な手技です。\n※復習するには第1回の動画を見てください。" },
  { chapter:'ch1', q:"肩関節や股関節は、あらゆる方向に動く多軸性の「球関節」である。", correct:true, a:"○ 正しい", hint:"球関節は多軸性であり、前後、左右、斜めなど様々な方向に動かすことができます。\n※復習するには第1回の動画を見てください。" },
  { chapter:'ch1', q:"手首の関節は「楕円関節」であり、縦と横の2軸性の動きを持つ。", correct:true, a:"○ 正しい", hint:"手首（橈骨と手根骨の間）は楕円関節で、屈曲・伸展、橈屈・尺屈の2方向の動きがあります。\n※復習するには第1回の動画を見てください。" },

  // ── 第3回 ──

  { chapter:'ch3', q:"タンパク質の一種であるアルブミンは、血管内に水分を留める働きがある。", correct:true, a:"○ 正しい", hint:"肝臓で作られるアルブミンは極めて水を引き寄せる力が強く、血管から水分が外に漏れ出さないように保っています。\n※復習するには第3回の動画を見てください。" },
  { chapter:'ch3', q:"肝臓や腎臓が弱るとアルブミンが不足し、深刻なむくみを引き起こす。", correct:true, a:"○ 正しい", hint:"アルブミンが不足すると血管内に水分を留めておけず、外に漏れ出して病的なむくみとなります。\n※復習するには第3回の動画を見てください。" },
  { chapter:'ch3', q:"免疫システムにおいて、敵の弱点に合わせた「抗体」を作る工場はマクロファージである。", correct:false, a:"✕ 抗体を作るのは「B細胞（Bリンパ球）」", hint:"抗体を作るのは「B細胞（Bリンパ球）」です。マクロファージは異物を食べて情報を知らせる役割です。\n※復習するには第3回の動画を見てください。" },

  { chapter:'ch4', q:"効果的なリンパドレナージュを行う際は、まずリンパ節の渋滞を解消するために周辺を緩めることが大切である。", correct:true, a:"○ 正しい", hint:"リンパ節は関所であり通過に時間がかかるため、先にリンパ節周辺を開通させる必要があります。\n※復習するには第4回の動画を見てください。" },

  { chapter:'ch5', q:"腹圧が高い状態とは、お腹の中の風船がパンパンに膨らみ、内臓や頭の重さをしっかり支えている状態である。", correct:true, a:"○ 正しい", hint:"腹圧が高いと姿勢が安定し、腰や首の筋肉への過剰な負担を防ぎます。\n※復習するには第5回の動画を見てください。" },

  { chapter:'ch5', q:"胸式呼吸は、肋骨自体がゴムのように伸び縮みして行われる。", correct:false, a:"✕ 肋骨自体は伸び縮みせず、関節を支点に「バケツの持ち手」のように上に持ち上がる動き", hint:"肋骨自体は伸び縮みせず、関節を支点にして「バケツの持ち手」のように上に持ち上がる動きをします。\n※復習するには第5回の動画を見てください。" },

  { chapter:'ch5', q:"腹圧が低下している人は、施術者が下部肋骨を持ち上げると腹圧が疑似的に高まり首の回旋がしやすくなる。", correct:true, a:"○ 正しい", hint:"腹圧が安定することで首や肩の筋肉の無駄な緊張が解け、可動域が広がります。\n※復習するには第5回の動画を見てください。" },

  // ── 第6回 ──

  { chapter:'ch6', q:"食道には痛覚や温度感覚がないため、食道がんは痛みを感じにくく発見が遅れやすい。", correct:true, a:"○ 正しい", hint:"熱いものを飲んで胸が熱く感じるのは周囲の組織の感覚であり、食道自体には感覚がありません。\n※復習するには第6回の動画を見てください。" },

// ===================== 状態管理 =====================
let currentQuestions = [];
let currentIndex = 0;
let correctCount = 0;
let currentMode = '';
let currentChapterId = '';

function show(id) {
  ['screen-start','screen-chapter','screen-quiz','screen-result'].forEach(s => {
    document.getElementById(s).style.display = 'none';
  });
  document.getElementById(id).style.display = 'block';
}

function showStart() {
  show('screen-start');
}

function showChapterSelect() {
  buildChapterList();
  show('screen-chapter');
}

function buildChapterList() {
  const list = document.getElementById('chapter-list');
  list.innerHTML = '';
  CHAPTERS.forEach(ch => {
    const qs = ALL_Q.filter(q => q.chapter === ch.id);
    const item = document.createElement('div');
    item.className = 'chapter-item';
    item.onclick = () => startChapter(ch.id);
    item.innerHTML = `
      <div class="chapter-num ${ch.special ? 'special' : ''}">${ch.special ? '特' : ch.label.replace('第','').replace('回','')}</div>
      <div class="chapter-info">
        <div class="chapter-name">${ch.label}：${ch.name.split('〜')[0].trim()}</div>
        <div class="chapter-sub">全${qs.length}問</div>
      </div>
      <div class="chapter-arrow">›</div>
    `;
    list.appendChild(item);
  });
}

function startRandom() {
  currentMode = 'random';
  const shuffled = [...ALL_Q].sort(() => Math.random() - 0.5);
  currentQuestions = shuffled.slice(0, 10);
  startQuiz();
}

function startChapter(chapterId) {
  currentMode = 'chapter';
  currentChapterId = chapterId;
  currentQuestions = ALL_Q.filter(q => q.chapter === chapterId);
  startQuiz();
}

function startQuiz() {
  currentIndex = 0;
  correctCount = 0;
  show('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = currentQuestions[currentIndex];
  const total = currentQuestions.length;
  const pct = (currentIndex / total) * 100;

  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('question-text').textContent = q.q;

  const ch = CHAPTERS.find(c => c.id === q.chapter);
  document.getElementById('q-chapter-badge').textContent = ch ? ch.label : '';
}

function answer(userAnswer) {
  const q = currentQuestions[currentIndex];
  const isCorrect = (userAnswer === q.correct);
  if (isCorrect) correctCount++;

  const header = document.getElementById('popup-header');
  const icon = document.getElementById('popup-icon');
  const label = document.getElementById('popup-label');
  const ans = document.getElementById('popup-ans');
  const hint = document.getElementById('popup-hint');
  const btn = document.getElementById('next-btn');

  header.className = 'popup-header ' + (isCorrect ? 'correct' : 'wrong');
  icon.textContent = isCorrect ? '⭕️' : '❌';
  label.textContent = isCorrect ? '正解！' : '不正解…';
  ans.textContent = '正解：' + q.a;
  hint.textContent = q.hint;

  const isLast = currentIndex >= currentQuestions.length - 1;
  btn.textContent = isLast ? '結果を見る →' : '次の問題へ →';

  document.getElementById('popup-overlay').classList.add('visible');
}

function nextQuestion() {
  document.getElementById('popup-overlay').classList.remove('visible');
  currentIndex++;
  if (currentIndex >= currentQuestions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  show('screen-result');
  const total = currentQuestions.length;
  const pct = Math.round((correctCount / total) * 100);

  let rank, emoji, title, msg;
  if (pct >= 90) { rank = 's'; emoji = '🏆'; title = '完璧！'; msg = '素晴らしい理解度です！この調子で知識を定着させましょう。'; }
  else if (pct >= 70) { rank = 'a'; emoji = '🌟'; title = 'よくできました！'; msg = '高い理解度です！間違えた問題を復習してさらに完璧に。'; }
  else if (pct >= 50) { rank = 'b'; emoji = '📚'; title = 'もう少し！'; msg = '基礎は押さえています。間違えた問題を重点的に復習しましょう。'; }
  else { rank = 'c'; emoji = '💪'; title = 'もっと頑張ろう！'; msg = '動画を見直して、もう一度チャレンジしてみましょう！'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;

  if (currentMode === 'chapter') {
    const ch = CHAPTERS.find(c => c.id === currentChapterId);
    document.getElementById('result-sub').textContent = (ch ? ch.label : '') + '：全' + total + '問 お疲れさまでした！';
  } else {
    document.getElementById('result-sub').textContent = 'ランダム' + total + '問 お疲れさまでした！';
  }

  const circle = document.getElementById('score-circle');
  circle.className = 'score-circle ' + rank;
  document.getElementById('score-num').textContent = correctCount;
  document.getElementById('score-denom').textContent = '/ ' + total + '問';
  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('wrong-count').textContent = total - correctCount;
  document.getElementById('result-msg').textContent = msg;

  const retryBtn = document.getElementById('retry-btn');
  retryBtn.onclick = () => {
    if (currentMode === 'random') startRandom();
    else startChapter(currentChapterId);
  };
}

function pauseQuiz() {
  document.getElementById('pause-progress-text').textContent =
    currentIndex + ' / ' + currentQuestions.length + ' 問目まで回答済み';
  document.getElementById('pause-overlay').classList.add('visible');
}

function resumeQuiz() {
  document.getElementById('pause-overlay').classList.remove('visible');
}

function quitQuiz() {
  document.getElementById('pause-overlay').classList.remove('visible');
  showStart();
}
</script>
</body>
</html>
